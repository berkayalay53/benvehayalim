<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anı Atlası — Berkay Alay</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* TOZ ZERRELERİ (YAVAŞ VE DERİN) */
    #dust-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .dust {
      position: absolute;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      animation: floatDust linear infinite;
    }
    @keyframes floatDust {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      20% { opacity: 0.4; }
      80% { opacity: 0.2; }
      100% { transform: translateY(-150px) translateX(30px); opacity: 0; }
    }

    /* PC GÖRÜNÜMÜ (ÖLÇEKLİ VE ZARİF) */
    @media (min-width: 1024px) {
      .photo-grid {
        /* Resimler PC'de çok büyümesin diye 230px sınırı koyduk */
        grid-template-columns: repeat(auto-fit, minmax(230px, 280px)); 
        justify-content: center; /* Ortada toplansınlar */
        gap: 30px;
      }
      .frame { padding: 10px; }
      .library-title { font-size: 4rem; } /* Çok devasa olmasın */
    }

    /* GİRİŞ EKRANI */
    #introScreen {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1113;
      transition: opacity 1.5s ease;
    }
    #introScreen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('./izel3.jpg') center/cover no-repeat;
      filter: blur(20px) brightness(0.2);
      z-index: -1;
    }

    /* SAYFA GEÇİŞLERİ */
    body { opacity: 0; transition: opacity 2s ease; }
    body.ready { opacity: 1 !important; }
    
    #introBtn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 12px 30px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: 0.5s;
    }
    #introBtn:hover { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body class="loaded">

  <div id="dust-container"></div>

  <div id="introScreen">
    <div class="intro-content" style="text-align: center;">
      <p style="font-family: var(--serif); font-style: italic; color: var(--text); margin-bottom: 20px;">"Sessizlikte biriken izler."</p>
      <button id="introBtn">ARŞİVİ ARALA</button>
    </div>
  </div>

  <div class="grain"></div>
  <div class="spotlight"></div>
  <div id="musicDisc" class="music-control"></div>

  <div class="wrap">
    <header class="blog-header">
      <h1 class="library-title">Sessizliğin Kaydı</h1>
      <p class="library-sub">"Zaman geçer, izler kalır."</p>
    </header>

    <section class="photo-grid">
      <div class="frame captain"><img src="./profil1.jpg" alt="Kaptan 1"></div>
      <div class="frame captain"><img src="./profil2.jpg" alt="Kaptan 2"></div>
      <div class="frame izel"><img src="./izel1.jpg" alt="İzel 1"></div>
      <div class="frame izel"><img src="./izel2.jpg" alt="İzel 2"></div>
      <div class="frame izel"><img src="./izel3.jpg" alt="İzel 3"></div>
    </section>

    <main class="post-container">
      <article class="post">
        <span class="post-date">16 Nisan 2026</span>
        <div class="post-content">
          <p>Karadeniz'in hırçınlığı dindiğinde, geriye sadece kıyıya vuran o yorgun köpükler kalıyor. Tıpkı zihnimdeki kelimeler gibi.</p>
        </div>
      </article>
    </main>

    <footer class="bottom-nav" style="text-align: center; margin-bottom: 50px;">
      <a href="./index.html" class="nav-back">← Kıyıya Dön</a>
    </footer>
  </div>

  <audio id="bgMusic" loop>
    <source src="./muzik.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById('bgMusic');
    const disc = document.getElementById('musicDisc');
    const intro = document.getElementById('introScreen');
    const btn = document.getElementById('introBtn');

    music.volume = 0.5;

    // TOZ EFEKTİ SCRIPT (Yavaş ve Rastgele)
    function createDust() {
      const container = document.getElementById('dust-container');
      for (let i = 0; i < 30; i++) {
        let dust = document.createElement('div');
        dust.className = 'dust';
        let size = Math.random() * 2 + 1;
        dust.style.width = size + 'px';
        dust.style.height = size + 'px';
        dust.style.left = Math.random() * 100 + 'vw';
        dust.style.top = Math.random() * 100 + 'vh';
        dust.style.animationDuration = (Math.random() * 20 + 20) + 's'; // 20-40 saniye arası (Çok yavaş)
        dust.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(dust);
      }
    }

    btn.addEventListener('click', () => {
      music.play();
      disc.classList.add('playing');
      intro.style.opacity = '0';
      setTimeout(() => {
        intro.remove();
        document.body.classList.add('ready');
      }, 1500);
    });

    disc.addEventListener('click', () => {
      if (music.paused) { music.play(); disc.classList.add('playing'); }
      else { music.pause(); disc.classList.remove('playing'); }
    });

    createDust();

    const spotlight = document.querySelector('.spotlight');
    document.addEventListener('mousemove', (e) => {
      spotlight.style.setProperty('--x', e.clientX + 'px');
      spotlight.style.setProperty('--y', e.clientY + 'px');
    });

    // Karanlık Kalma Sorunu İçin Failsafe
    setTimeout(() => { document.body.classList.add('ready'); }, 2000);
  </script>
</body>
</html>
