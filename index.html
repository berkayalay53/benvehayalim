<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anı Atlası — Berkay Alay</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* PC'DE ÖZEL BÜYÜK GÖRÜNÜM */
    @media (min-width: 1024px) {
      html { font-size: 20px; }
      .wrap { width: min(1300px, 92vw); }
      .photo-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
      .library-title { font-size: 5.5rem; }
    }

    /* GİRİŞ EKRANI (INTRO) AYARLARI */
    #introScreen {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1113;
      transition: opacity 1.2s ease, visibility 1.2s;
    }

    /* İzel3'ü blurlu arka plan yapıyoruz */
    #introScreen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('./izel3.jpg') center/cover no-repeat;
      filter: blur(15px) brightness(0.3);
      z-index: -1;
    }

    .intro-content { text-align: center; }
    .intro-text { 
      font-family: var(--serif); 
      font-size: 1.5rem; 
      color: var(--text); 
      margin-bottom: 30px; 
      font-style: italic; 
    }

    #introBtn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 12px 35px;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: 0.4s;
    }

    #introBtn:hover {
      background: var(--accent);
      color: #0f1113;
    }

    /* CSS'teki opacity:0'ı kırmak için */
    body.ready { opacity: 1 !important; }
  </style>
</head>
<body class="loaded"> <div id="introScreen">
    <div class="intro-content">
      <p class="intro-text">"Zaman geçer, izler kalır."</p>
      <button id="introBtn">Sessizliği Arala</button>
    </div>
  </div>

  <div class="grain"></div>
  <div class="spotlight"></div>
  <div id="musicDisc" class="music-control" title="Sesi Aç/Kapat"></div>

  <div class="wrap">
    <header class="blog-header">
      <h1 class="library-title">Sessizliğin Kaydı</h1>
      <p class="library-sub">"Kaptan'ın anı atlası."</p>
    </header>

    <section class="photo-grid">
      <div class="frame captain"><img src="./profil1.jpg" alt="Kaptan — I"></div>
      <div class="frame captain"><img src="./profil2.jpg" alt="Kaptan — II"></div>
      <div class="frame izel"><img src="./izel1.jpg" alt="İzel — I"></div>
      <div class="frame izel"><img src="./izel2.jpg" alt="İzel — II"></div>
      <div class="frame izel"><img src="./izel3.jpg" alt="İzel — III"></div>
    </section>

    <main class="post-container">
      <article class="post">
        <span class="post-date">16 Nisan 2026</span>
        <div class="post-content">
          <p>Karadeniz'in hırçınlığı dindiğinde, geriye sadece kıyıya vuran o yorgun köpükler kalıyor. Tıpkı zihnimdeki kelimeler gibi.</p>
        </div>
      </article>
    </main>

    <footer class="bottom-nav">
      <a href="./index.html" class="nav-back">← Kıyıya Dön</a>
    </footer>
  </div>

  <audio id="bgMusic" loop>
    <source src="./muzik.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById('bgMusic');
    const disc = document.getElementById('musicDisc');
    const introScreen = document.getElementById('introScreen');
    const introBtn = document.getElementById('introBtn');

    music.volume = 0.5;

    // GİRİŞ BUTONU FONKSİYONU
    introBtn.addEventListener('click', () => {
      music.play().catch(e => console.log("Otomatik oynatma engellendi"));
      disc.classList.add('playing');
      
      introScreen.style.opacity = '0';
      setTimeout(() => {
        introScreen.style.visibility = 'hidden';
        document.body.classList.add('ready');
      }, 1200);
    });

    // MÜZİK KONTROLÜ
    disc.addEventListener('click', () => {
      if (music.paused) {
        music.play();
        disc.classList.add('playing');
      } else {
        music.pause();
        disc.classList.remove('playing');
      }
    });

    // FENER EFEKTİ
    const spotlight = document.querySelector('.spotlight');
    document.addEventListener('mousemove', (e) => {
      spotlight.style.setProperty('--x', e.clientX + 'px');
      spotlight.style.setProperty('--y', e.clientY + 'px');
    });

    // GÜVENLİK SÜBABINI EN ALTA ÇEKTİK
    setTimeout(() => {
      document.body.classList.add('loaded');
    }, 1000);
  </script>
</body>
</html>
